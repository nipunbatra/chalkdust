[package]
name = "ml-field"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["Nipun Batra"]
license = "MIT"
description = "2-D and 3-D field plots for ML/DL teaching — heatmaps, iso-contours (marching squares), and 3-D surfaces of f(x,y), with overlaid descent paths and marked points. Native Typst on CeTZ, themed via ml-theme."
keywords = ["contour", "heatmap", "surface", "loss-landscape", "teaching"]
